name: ci

on:
  push:
  pull_request:

jobs:
  build-and-gate:
    runs-on: ubuntu-latest

    # Postgres for the persistence (Phase 3) integration gates: RLS isolation,
    # verdict_event immutability, idempotency/materialization.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: provable
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d provable"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20

    env:
      # App role (RLS-enforced) and direct superuser (migrations).
      DATABASE_URL: postgresql://provable_app:provable_app@localhost:5432/provable?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/provable?schema=public

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Create RLS-subject app role
        run: psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f docker/initdb/01-app-role.sql

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Depcruise (architecture gate)
        run: pnpm depcruise

      - name: Arch-gate guard (prove the gate still reports known-bad imports)
        run: pnpm arch:guard

  # Isolated Python SDK job (own uv toolchain, OUTSIDE the Turbo pipeline). Runs on
  # every push so an un-mirrored TS contract change (manifest vs Pydantic enums) fails CI.
  sdk-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Sync
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (unit + drift; integration auto-skips without a live API)
        run: uv run pytest -m "not integration"
