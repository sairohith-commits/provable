# Render blueprint for the Provable API (apps/api) from this pnpm/Turbo monorepo.
# Build compiles api + its workspace deps (contracts, core, persistence); persistence's
# build runs `prisma generate`. On start it applies pending migrations against the DIRECT
# (non-pooled) Neon URL, then boots Fastify. Health check hits /health.
#
# NOTE: Render injects PORT — server.ts already listens on process.env.PORT / 0.0.0.0.
# Set DATABASE_URL, DIRECT_URL and PROVABLE_INTERNAL_TOKEN in the dashboard (sync:false).
services:
  - type: web
    name: provable-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: "pnpm install --frozen-lockfile && pnpm --filter @provable/api... build"
    # migrate → idempotent owner-seed (gate 2) → serve. owner-seed no-ops if BOOTSTRAP_OWNER_EMAIL
    # is unset, so it never breaks a deploy, and is safe to re-run on every deploy.
    startCommand: "pnpm --filter @provable/persistence exec prisma migrate deploy && node scripts/owner-seed.mjs && node apps/api/dist/server.js"
    healthCheckPath: /health
    envVars:
      # DATABASE_URL = provable_app role (RLS-enforced) — the app runtime connection.
      - key: DATABASE_URL
        sync: false
      # DIRECT_URL = Neon DIRECT (non-pooled) owner connection — migrations only.
      - key: DIRECT_URL
        sync: false
      # MUST equal the value set on Vercel (web↔api internal auth). Generate a strong one.
      - key: PROVABLE_INTERNAL_TOKEN
        sync: false
      # Gate 2 owner-seed (set in the dashboard). Owner is ensured idempotently on each deploy;
      # unset BOOTSTRAP_OWNER_EMAIL → the seed step is a no-op. For the live org: set
      # BOOTSTRAP_OWNER_ORG=org_support and BOOTSTRAP_OWNER_EMAIL=<owner email>.
      - key: BOOTSTRAP_OWNER_ORG
        sync: false
      - key: BOOTSTRAP_OWNER_EMAIL
        sync: false
